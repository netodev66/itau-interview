apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages-api
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: messages-api
  template:
    metadata:
      labels:
        app: messages-api
    spec:
      serviceAccountName: messages-api

      # Spread pods across AZs to match the two private subnets declared in Terraform
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: messages-api

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      containers:
        - name: messages-api
          # IMAGE_TAG is replaced by the CI/CD pipeline via envsubst
          image: <ECR_REPO_URL>:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: messages-api-config
            - secretRef:
                name: messages-api-secrets  # populated by ExternalSecret from Secrets Manager

          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health/readiness
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
