apiVersion: v1
kind: ServiceAccount
metadata:
  name: messages-api
  namespace: app
  annotations:
    # IRSA: replace with the IAM role ARN created in Terraform (eks.tf)
    # This grants the pod permission to access DynamoDB without static credentials
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/itau-messages-production-app-role
