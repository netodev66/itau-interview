apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Uses the pod's ServiceAccount (IRSA) to authenticate with AWS —
      # no static credentials needed
      auth:
        jwt:
          serviceAccountRef:
            name: messages-api
